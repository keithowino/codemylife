<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="shortcut icon" href="favicon.svg" type="image/x-icon" />
		<title>Firebase Rocket - Pickaxe & Shovel</title>
		<style>
			* {
				box-sizing: border-box;
				padding: 0;
				margin: 0;
				font-family: Arial, Helvetica, sans-serif;
			}

			.app {
				width: 100vw;
				height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				background-color: rgb(200, 200, 200);
			}

			.header {
				width: 100%;
				background-color: #fff;
				padding: 1em;
				display: flex;
				align-items: center;
				justify-content: space-between;
			}

			.title {
				font-size: 2em;
			}

			.navbar {
				width: 50%;
				font-size: 1.5em;
				display: flex;
				align-items: center;
				justify-content: space-evenly;
			}

			.adder {
				margin: 1em 0;
				width: 100%;
				display: flex;
				flex-direction: column;
				align-items: center;
			}

			input {
				border: 0;
				outline: 0;
				background-color: transparent;
				font-size: 1.5em;
				border-bottom: 1px solid teal;
				margin: 1em 0;
			}

			.button {
				padding: 1em;
				border-radius: 1em;
				background-color: teal;
				color: #fff;
				font-weight: bolder;
				cursor: pointer;
				border: none;
				outline: none;
				transition: all;
				transition-duration: 3ms;
			}

			.button:hover {
				background-color: rgb(3, 154, 154);
			}

			.content {
				width: 100%;
				display: flex;
				align-items: center;
				justify-content: space-evenly;
				flex-wrap: wrap;
			}

			.user-loader {
				padding: 4em 0;
				border: 2px dotted #000;
				width: 50%;
				border-radius: 8px;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.card {
				width: 30%;
				display: flex;
				align-items: center;
				justify-content: space-between;
				box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.5);
				padding: 1em;
				background-color: #fff;
				margin: 1em;
			}

			.card > .name {
				font-size: 2em;
			}

			.card > .age {
				font-size: 1.5em;
				color: rgb(100, 100, 100);
			}
		</style>
	</head>
	<body>
		<div class="app">
			<div class="header">
				<div class="title">Firebase Rocket</div>
				<div class="navbar">
					<div class="opt">Home</div>
					<div class="opt">About</div>
					<div class="opt">Contact</div>
				</div>
			</div>
			<!-- <div class="adder"> -->
			<div>
				<div class="title"></div>
				<form class="adder" onsubmit="addUser(event)">
					<input type="text" id="name" placeholder="Name" />
					<input type="number" id="age" placeholder="Age" />
					<button type="submit" class="button">ADD</button>
				</form>
			</div>
			<div class="content"></div>
		</div>

		<script src="https://www.gstatic.com/firebasejs/8.5.0/firebase-app.js"></script>
		<script src="https://www.gstatic.com/firebasejs/8.5.0/firebase-firestore.js"></script>
		<script src="./firebase.config.js"></script>
		<script>
			// const btn = document.querySelector(".button");

			// btn.disabled = true;

			const get = (a) => {
				return document.querySelector(a);
			};

			const create = (a) => {
				return document.createElement(a);
			};

			const setLoading = (action) => {
				const container = document.querySelector(".content");

				let userLoader = create("div");
				userLoader.setAttribute("class", "user-loader");

				if (action === "empty") {
					userLoader.innerText = "No users";
					container.innerHTML = "";
					container.append(userLoader);
				} else if (action === true) {
					userLoader.innerText = "Loading users...";
					container.innerHTML = "";
					container.append(userLoader);
				} else {
					container.innerHTML = "";
				}
			};

			document.addEventListener("DOMContentLoaded", async () => {
				try {
					setLoading(true);

					const snapshot = await db.collection("users").get();

					setLoading(false);

					if (snapshot.size < 1) {
						setLoading("empty");
					} else {
						snapshot.forEach((doc) => {
							makeCard(doc.data());
						});
					}
				} catch (error) {
					document.querySelector(".content").innerHTML =
						"<div>Error loading data</div>";
					console.error(error);
				}
			});

			const makeCard = (a) => {
				let card = create("div");
				let name = create("div");
				let age = create("div");

				name.innerText = a.name;
				age.innerText = a.age;

				card.setAttribute("class", "card");
				name.setAttribute("class", "name");
				age.setAttribute("class", "age");

				card.append(name);
				card.append(age);

				get(".content").append(card);
			};

			const addUser = (e) => {
				e.preventDefault();

				const btn = document.querySelector(".button");
				btn.disabled = true; // disable AFTER click

				try {
					const data = {
						name: get("#name").value,
						age: Number(get("#age").value),
					};

					if (!data.name || !data.age) {
						alert("Please fill all fields");
						btn.disabled = false; // re-enable if validation fails
						return;
					}

					db.collection("users")
						.add(data)
						.then(() => {
							makeCard(data);

							get("#name").value = "";
							get("#age").value = "";
						})
						.catch((err) => console.error(err))
						.finally(() => {
							btn.disabled = false; // re-enable after request
						});
				} catch (error) {
					console.error(error);
					btn.disabled = false;
				}
			};
		</script>
	</body>
</html>
